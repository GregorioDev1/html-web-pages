<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Code Quest</title>
</head>
<body>
    <!-- Header / navigation (consistent with page 1) -->
        <header>
            <nav>
                <div class="logo">Code Quest</div>
                <ul>
                    <li><a href="index.html"><strong>Home</strong></a></li>
                    <li><a href="signin.html">Sign In</a></li>
                </ul>
            </nav>
        </header>
    <!-- Main content -->
    <main>
        <!-- authentication coontainer -->
        <section class="auth-container">
            <div class="auth-header">
                <h1>Sign Up</h1>
            </div>
            <form action="#" method="post" class="auth-form">
                <div class="form-group">
                    <label for="firstname">First Name</label>
                    <input type="text" name="firstname" id="firstname" placeholder="Enter your first name">
                </div>
                <div class="form-group">
                    <label for="lastname">Last Name</label>
                    <input type="text" name="lastname" id="lastname" placeholder="Enter your last name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" name="password" id="password" minlength="8" placeholder="Enter your password" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="password_confirm">Confirm Password</label>
                    <input type="password" name="password_confirm" id="password_confirm" minlength="8" placeholder="Enter your password" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn-primary">Sign Up</button>

            <!-- link to signin page -->
            <div class="auth-footer">
                <p>Already have an account? <a href="signin.html">Sign In</a></p>
            </div>

            <!-- team photo -->
             <div class=" team-section">
                <p>Join and Learn together!</p>
                <img src="assets/team.svg" alt="Code Quest Team" class="team-img">
             </div>

            </form>

         </section>
    </main>
    <!-- Footer (consistent with page 1) -->
    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Code Quest. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
